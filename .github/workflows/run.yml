name: AI Research Assistant

on:
  workflow_dispatch:  # ✅ 保留手动触发，方便测试
  schedule:
    # 所有时间为 UTC，北京时间 = UTC+8
    - cron: '30 1 * * *'   # 北京 09:30 → 论文简报
    - cron: '0 2 * * *'    # 北京 10:00 → 上午督促
    - cron: '0 7 * * *'    # 北京 15:00 → 下午督促
    - cron: '0 13 * * *'   # 北京 21:00 → 晚间总结

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run script
      run: python main.py
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}  # ✅ 与 main.py 保持一致
